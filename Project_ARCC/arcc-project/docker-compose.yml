services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - database
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: arcc
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    depends_on:
      - backend
    env_file:
      - path: ./frontend/.env.local
        required: false
    environment:
      REACT_APP_API_BASE: http://localhost:5000/api

  database:
    image: mysql:8
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: arcc
    volumes:
      - mysql_data:/var/lib/mysql
      # Directory mount (reliable on Windows; avoid single-file bind mounts)
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data: